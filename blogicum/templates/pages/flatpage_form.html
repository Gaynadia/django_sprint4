{% extends "base.html" %}
{% block title %}
  {% if object %}
    Редактировать страницу
  {% else %}
    Создать страницу
  {% endif %}
{% endblock %}
{% block content %}
  <div class="col d-flex justify-content-center">
    <div class="card" style="width: 40rem;">
      <div class="card-header">
        {% if object %}
          Редактировать страницу
        {% else %}
          Создать страницу
        {% endif %}
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">
            {% if object %}
              Сохранить
            {% else %}
              Создать
            {% endif %}
          </button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
